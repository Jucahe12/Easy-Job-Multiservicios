<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Página no encontrada | Easy-Job Multiservicios</title>
  <meta name="description" content="La página que buscas no existe. Vuelve al inicio de Easy-Job Multiservicios." />
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .error-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .error-code {
      font-size: 8rem;
      font-weight: 800;
      background: var(--brand-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 1rem;
    }
    .error-icon {
      font-size: 5rem;
      margin-bottom: 1rem;
    }
    .error-title {
      font-size: 2rem;
      color: var(--ink);
      margin-bottom: 1rem;
    }
    .error-description {
      color: var(--muted);
      max-width: 500px;
      margin-bottom: 2rem;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-icon"><i class="fa-solid fa-leaf"></i></div>
    <div class="error-code">404</div>
    <h1 class="error-title">Página no encontrada</h1>
    <p class="error-description">
      Lo sentimos, la página que estás buscando no existe o ha sido movida.
      <br>Te invitamos a volver a nuestra página principal.
    </p>
    <a href="index.html" class="btn btn-primary btn-lg">
      Volver al inicio
    </a>
  </div>
</body>
</html>
